name: Flutter CI

on:
  pull_request:
  push:
    branches: ["feat/**"]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      # Gate on real ERRORS only. This legacy repo has many pre-existing
      # style lints (info/warning); they shouldn't block the build check.
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
